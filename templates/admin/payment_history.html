<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Payment Reminder</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/admin/payment_history.css') }}">
  {% include 'navbar.html' %}
</head>

<body>
  <div class="table">
    <h1>Payment History</h1>
    <table>
      <thead>
        <tr>
          <th>Transaction Type</th>
          <th>Date Paid</th>
          <th>Amount</th>
          <th>Manage</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          {% if history %}
          {% for histories in history %}
          <td>{{ histories[4] }}</td>
          <td>{{ histories[2] }}</td>
          <td>{{ histories[3] }}</td>
          <td>
            <button class="btn-remind">Remind</button>
          </td>
        </tr>
        {%endfor%}
        {% else %}
        <td colspan="4">No Result</td>
        {% endif %}
      </tbody>
    </table>

    <dialog class="pop-up-edit">
      <label for="name">Name:</label>
      <input type="text" class="name" placeholder="Name">
      <p><b>Name: </b></p>
      <p><b>Transaction Type:</b></p>
      <p><b>Total Amount:</b></p>
      <p><b>Date of payment:</b></p>
      <button class="close">Close</button>
    </dialog>
  </div>

</body>

<script>
  const modal = document.querySelector('.pop-up-edit');
  const openModal = document.querySelector('.btn-remind');
  const closeModal = document.querySelector('.close');

  openModal.addEventListener('click', () => {
    modal.showModal();
  })

  closeModal.addEventListener('click', () => {
    modal.close();
  })
</script>

</html>
