<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/admin/edit_info.css') }}">
    {% include 'navbar.html' %}
    <title>Edit User Info</title>
</head>

<body>
    <h1>EDIT USER INFO</h1>
    <main>
        {% if info %}
        <h3>Personal Information</h3>
        <div class="personal-information">
            <label for="given-name">Given Name
                <input type="text" id="given-name" name="given-name" required
                    value="{% if info[2] == None %}""{% else %}{{info[2]}}{% endif%}">
            </label>
            <label for="last-name">Last Name
                <input type="text" id="last-name" name="last-name" required
                    value="{% if info[3] == None %}""{% else %}{{info[3]}}{% endif%}">
            </label>
            <label for="middle-name">Middle Name
                <input type="text" id="middle-name" name="middle-name" required
                    value="{% if info[4] == None %}""{% else %}{{info[4]}}{% endif%}">
            </label>
            <label for="gender">Gender
                <select class="select" name="gender" id="gender" required>
                    {% if info[5] %}
                    {% if info[5] == "Male" : %}
                    <option value="Male">Male</option>
                    <option value="Female">Female</option>
                    {% elif info[5] == "Female" : %}
                    <option value="Female">Female</option>
                    <option value="Male">Male</option>
                    {% else : %}
                    <option value="">Please Select One</option>
                    <option value="Male">Male</option>
                    <option value="Female">Female</option>
                    {% endif %}
                    
                    {% endif %}
                </select>
            </label>
        </div>
        <h3>Property Information</h3>
        <div class="property-information">

            <label for="id-no">ID No.
                <input type="text" id="id-no" name="id-no" required
                    value="{% if info[8] == None %}""{% else %}{{info[8]}}{% endif%}">
            </label>
            <label for="blk-no">Block No.
                <input type="text" id="blk-no" name="blk-no" required
                    value="{% if info[9] == None %}""{% else %}{{info[9]}}{% endif%}">
            </label>
            <label for="lot-no">Lot No.
                <input type="text" id="lot-no" name="lot-no" required
                    value="{% if info[10] == None %}""{% else %}{{info[10]}}{% endif%}">
            </label>
            <label for="homelot">Homelot Area
                <input type="text" id="homelot" name="homelot" required
                    value="{% if info[11] == None %}""{% else %}{{info[11]}}{% endif%}">
            </label>
            <label for="open-space">Open Space
                <input type="text" id="open-space" name="open-space" required
                    value="{% if info[12] == None %}""{% else %}{{info[12]}}{% endif%}">
            </label>
            <label for="Loan">Share In Loan
                <input type="text" id="loan" name="loan" required
                    value="{% if info[13] == None %}""{% else %}{{info[13]}}{% endif%}">
            </label>
            <label for="PI">Principal Interest
                <input type="text" id="PI" name="PI" required
                    value="{% if info[14] == None %}""{% else %}{{info[14]}}{% endif%}">
            </label>
            <label for="MRI">MRI
                <input type="text" id="MRI" name="MRI" required
                    value="{% if info[15] == None %}""{% else %}{{info[15]}}{% endif%}">
            </label>
            <label for="total">Total
                <input type="text" id="total" name="total" required
                    value="{% if info[15] == None %}""{% else %}{{info[15]}}{% endif%}">
            </label>

        </div>

        <div class="buttons">
            <button class="close"><a href="">Close</a></button>
            <button class="update"><a href="">Update</a></button>
        </div>
        {% endif %}
    </main>
</body>

</html>
</body>

</html>
